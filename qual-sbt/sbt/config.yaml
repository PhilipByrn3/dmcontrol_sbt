# =============================================================================
# config.yaml — Split-Belt Rimless Wheel Simulation
# =============================================================================
# Single source of truth for all physical and simulation parameters.
# Physical values match the Butterfield et al. (2022) experimental apparatus.
# The default configuration (fast-side rubber + 4.9 mm offset) gives the best
# quantitative agreement with experimental results (Figure 4 in writeup).
# =============================================================================

# --- Wheel parameters --------------------------------------------------------
axle_length: 0.038          # m, half-length of axle cylinder (full axle = 7.6 cm)
twoalpha: 15.5              # deg, angular offset of slow-side spoke cluster
twobeta: 4.5                # deg, angular offset of fast-side spoke cluster
spoke_length: 0.254         # m
spoke_angle_step: 40        # deg, spacing between consecutive spokes
                            #   9 spokes per side: 40°, 80°, …, 360°
component_mass: 0.095405    # kg, mass per spoke / spoke-addition component
wheel_height: 0.38          # m, initial axle height above ground

# Rubber pads on spoke tips — modelled as spring-mass-damper spheres.
# Fast-side only is the validated default: reduces bouncing on the fast belt
# while preserving energy dissipation on the slow belt. See CLAUDE.md.

# --- Rubber parameters -------------------------------------------------------
rubber_friction: [1, 1, 0.1]
rubber_solimp: [0.8, 0.8, 0.01]
rubber_solref: [0.02, 1] # do not modify
rubber_size: [0.017] # 0.017 is good
smd_range: [0, 0.015] # spring mass damper
smd_stiffness: 50
smd_damping: 10

slow_side_rubber: false
fast_side_rubber: false

# --- Belt parameters ---------------------------------------------------------
slow_belt_xpos: -0.051      # m, x-position of slow (red) belt centre
fast_belt_xpos:  0.051      # m, x-position of fast (blue) belt centre
fast_belt_zoffset: 0.0049   # m, z-offset raises fast belt slightly above slow belt
                            #   0.0 = coplanar; 0.0049 = best experimental match
belt_half_width:  0.05      # m
belt_half_length: 10.0      # m
belt_half_height: 0.1       # m
belt_friction: [1.15, 0.1, 0.1]   # sliding, torsional, rolling friction
belt_mass: 3.0              # kg

# --- Simulation parameters ---------------------------------------------------
slow_belt_speed: 0.0        # m/s  (slow belt is always stationary)
starting_belt_diff: 0.15    # m/s, sweep start value
max_belt_diff: 1.1          # m/s, sweep end value
belt_diff_increment: 0.05   # m/s, sweep step size

max_timesteps: 2000         # per-trial timestep cap (at 0.01 s/step = 20 s max)
target_rotations: 12         # end trial early after this many full wheel rotations

# --- Output options ----------------------------------------------------------
# Priority: run_offset_comparison > run_all_rubber > single sweep
run_offset_comparison: true # true  → 8-panel grid: all 4 rubber configs × 2 offsets
run_all_rubber: true         # true  → 4-panel grid: all rubber configs at current offset
                             # false → single sweep using slow/fast_side_rubber above
show_plot: true              # true  → open plot window after saving

# --- Solver / integrator -----------------------------------------------------
# RK4 + PGS + Elliptic cone produced the best match to Butterfield data.
# Do not change without understanding the physics implications (see CLAUDE.md).
timestep: 0.01              # s
integrator: RK4
solver: PGS
cone: Elliptic
iterations: 50
